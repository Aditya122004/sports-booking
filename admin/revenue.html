<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Revenue — Admin — SportBook</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">🏟️ Sport<span>Book</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
        <a href="users.html"><span class="icon">👥</span> Users</a>
        <a href="bookings.html"><span class="icon">📋</span> Bookings</a>
        <a href="sports.html"><span class="icon">🏆</span> Sports</a>
        <a href="facilities.html"><span class="icon">🏟️</span> Facilities</a>
        <a href="revenue.html" class="active"><span class="icon">💰</span> Revenue</a>
        <a href="../dashboard.html"><span class="icon">🏠</span> User View</a>
        <a href="#" onclick="AUTH.logout()"><span class="icon">🚪</span> Logout</a>
      </nav>
    </aside>
    <main class="admin-main">
      <div style="margin-bottom:32px"><h1>Revenue Analytics 💰</h1><p>Platform earnings and analytics</p></div>
      <div class="grid-4" style="margin-bottom:40px">
        <div class="stat-card"><div class="stat-icon">💰</div><div><div class="stat-value" id="total-rev">—</div><div class="stat-label">Total Revenue</div></div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div><div class="stat-value" id="confirmed">—</div><div class="stat-label">Confirmed</div></div></div>
        <div class="stat-card"><div class="stat-icon">⏳</div><div><div class="stat-value" id="pending">—</div><div class="stat-label">Pending</div></div></div>
        <div class="stat-card"><div class="stat-icon">❌</div><div><div class="stat-value" id="cancelled">—</div><div class="stat-label">Cancelled</div></div></div>
      </div>
      <h2 style="margin-bottom:20px">Monthly Breakdown</h2>
      <div id="revenue-container"><div class="loading-overlay"><div class="spinner"></div></div></div>
    </main>
  </div>
  <div id="toast-container"></div>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script>
    AUTH.requireAdmin();
    async function loadRevenue() {
      const container = document.getElementById('revenue-container');
      try {
        const data = await AdminAPI.getRevenue();
        document.getElementById('total-rev').textContent = '₹' + (data.totalRevenue  || data.total_revenue  || 0);
        document.getElementById('confirmed').textContent =        data.confirmedCount || data.confirmed_count || 0;
        document.getElementById('pending').textContent   =        data.pendingCount   || data.pending_count   || 0;
        document.getElementById('cancelled').textContent =        data.cancelledCount || data.cancelled_count || 0;

        const monthly = data.monthly || data.monthlyRevenue || data.monthly_revenue || [];
        if (!monthly.length) {
          container.innerHTML = '<p style="color:var(--text-muted)">No monthly data available</p>';
          return;
        }
        container.innerHTML = `
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Month</th><th>Bookings</th><th>Revenue</th><th>Growth</th></tr></thead>
              <tbody>
                ${monthly.map((m, i) => {
                  const prev   = monthly[i - 1];
                  const growth = prev && prev.revenue ? (((m.revenue - prev.revenue) / prev.revenue) * 100).toFixed(1) : null;
                  return `<tr>
                    <td>${m.month || m.period}</td>
                    <td>${m.bookings || m.count || 0}</td>
                    <td style="color:var(--accent);font-weight:600">₹${m.revenue || 0}</td>
                    <td>${growth !== null
                      ? `<span style="color:${growth >= 0 ? 'var(--success)' : 'var(--danger)'}">${growth >= 0 ? '↑' : '↓'} ${Math.abs(growth)}%</span>`
                      : '<span style="color:var(--text-muted)">—</span>'}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>`;
      } catch (err) {
        container.innerHTML = `<div class="alert alert-danger">⚠️ ${err.message}</div>`;
      }
    }
    loadRevenue();
  </script>
</body>
</html>
