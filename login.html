<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SportBook</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-box">
      <div class="auth-logo">🏟️ Sport<span>Book</span></div>
      <div class="auth-subtitle">Login to your account</div>

      <div id="error-msg"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" class="form-control" placeholder="aditya@gmail.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••"/>
      </div>

      <button class="btn btn-primary btn-block" id="loginBtn" onclick="doLogin()">Login</button>

      <div class="auth-divider">or</div>
      <p style="text-align:center;font-size:0.9rem">
        Don't have an account? <a href="register.html">Register here</a>
      </p>

      <div style="margin-top:20px;padding:14px;background:var(--bg-card2);border-radius:var(--radius-sm);font-size:0.82rem;color:var(--text-muted)">
        <strong style="color:var(--text-main)">Demo Credentials:</strong><br/>
        Admin: admin@sportsbook.com / Admin@123<br/>
        User: user@example.com / User@123
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    AUTH.redirectIfLoggedIn();

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errDiv   = document.getElementById('error-msg');

      errDiv.innerHTML = '';
      if (!email || !password) {
        errDiv.innerHTML = '<div class="alert alert-danger">Please enter email and password</div>';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await AuthAPI.login(email, password);
        AUTH.setToken(res.token);
        AUTH.setUser(res.user);
        showToast('Login successful! 🎉', 'success');
        setTimeout(() => {
          if (res.user.role === 'ADMIN') {
            window.location.href = 'admin/dashboard.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        }, 800);
      } catch (err) {
        errDiv.innerHTML = `<div class="alert alert-danger">⚠️ ${err.message}</div>`;
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
